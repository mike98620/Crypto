name: crypto-signal-check

on:
  schedule:
    # 每 15 分鐘檢查一次（cron 為 UTC 時間，不用換算，直接照抄即可）
    - cron: '*/15 * * * *'
  workflow_dispatch: {}   # 允許在 GitHub 網頁上手動點擊執行，方便測試

permissions:
  contents: write   # 需要寫入權限，才能把 state/last_alert.json 的變更 commit 回去

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 取出 repository 內容
        uses: actions/checkout@v4

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 執行訊號檢查
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: node line-bot/check_signal.js

      - name: 把最新的通知紀錄存回 repository
        run: |
          git config user.name "signal-bot"
          git config user.email "signal-bot@users.noreply.github.com"
          git add line-bot/state/last_alert.json || true
          git diff --quiet && git diff --staged --quiet || git commit -m "update last alert state"
          git push || true
